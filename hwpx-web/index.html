<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWPX AI 문서 생성기</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <h1>HWPX Generator</h1>
    <div class="header-controls">
      <select id="ai-model-select" class="select-model">
        <option value="gemini">Gemini</option>
        <option value="claude">Claude</option>
        <option value="openai">ChatGPT</option>
      </select>
      <div id="ai-status" class="status-badge disconnected" title="API Key 설정 필요"></div>
      <button id="btn-settings" class="icon-btn">⚙️ 설정</button>
    </div>
  </header>

  <main class="main-container">
    <section class="panel panel-editor">
      <div class="ai-card">
        <h3>🤖 AI로 생성</h3>
        <textarea id="ai-prompt" class="ai-input" placeholder="여기에 작성하고 싶은 문서 내용을 입력하세요. 예: 전북교육청 AI TF발족 공문 초안 작성해줘"></textarea>
        <button id="btn-generate-ai" class="btn">AI로 생성하기 ▶</button>
      </div>

      <div style="margin-bottom: 1rem;">
        <label>적용 템플릿: </label>
        <select id="template-select" class="select-model">
          <option value="base">기본</option>
          <option value="gonmun" selected>공문 (gonmun)</option>
          <option value="report">보고서 (report)</option>
          <option value="minutes">회의록 (minutes)</option>
          <option value="proposal">제안서 (proposal)</option>
        </select>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem;">
        <h3 style="margin:0;">블록 목록</h3>
        <button id="btn-add-block" class="btn" style="background:rgba(255,255,255,0.1); font-size:0.8rem;">+ 문단 추가</button>
      </div>
      
      <div id="block-list" class="block-list">
        <!-- Editor blocks will be rendered here -->
      </div>
    </section>

    <section class="panel" style="background:#0f172a;">
      <div style="margin-bottom: 1rem; display:flex; justify-content:flex-end;">
        <button id="btn-download" class="btn">↓ HWPX 다운로드</button>
      </div>
      <div style="overflow:auto; height: 100%; display:flex; justify-content:center;">
        <div id="preview-panel" class="preview-container">
          <!-- Live Preview -->
        </div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
        <h2 style="margin:0; font-size:1.25rem;">⚙️ API 설정 (BYOK)</h2>
        <button class="icon-btn btn-close-modal" style="border:none;">✕</button>
      </div>
      
      <div class="tabs">
        <button class="tab active" data-target="tab-gemini">Gemini</button>
        <button class="tab" data-target="tab-claude">Claude</button>
        <button class="tab" data-target="tab-openai">ChatGPT</button>
      </div>

      <div id="tab-gemini" class="tab-content">
        <div class="form-group">
          <label>Google Gemini API Key</label>
          <input type="password" id="input-api-gemini" placeholder="AIzaSy..." />
        </div>
        <p style="font-size:0.75rem; color:var(--text-secondary);">
          <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent-color);">Google AI Studio</a>에서 발급받으세요.
        </p>
      </div>

      <div id="tab-claude" class="tab-content" style="display:none;">
        <div class="form-group">
          <label>Anthropic Claude API Key</label>
          <input type="password" id="input-api-claude" placeholder="sk-ant-..." />
        </div>
        <p style="font-size:0.75rem; color:var(--text-secondary);">
          <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--accent-color);">Anthropic Console</a>에서 발급받으세요.
        </p>
      </div>

      <div id="tab-openai" class="tab-content" style="display:none;">
        <div class="form-group">
          <label>OpenAI ChatGPT API Key</label>
          <input type="password" id="input-api-openai" placeholder="sk-proj-..." />
        </div>
        <p style="font-size:0.75rem; color:var(--text-secondary);">
          <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--accent-color);">OpenAI Platform</a>에서 발급받으세요.
        </p>
      </div>

      <div class="modal-actions">
        <button id="btn-save-key" class="btn">저장</button>
        <button id="btn-delete-key" class="btn" style="background:var(--error);">삭제</button>
      </div>
      <p style="font-size:0.75rem; color:var(--text-secondary); margin-top:1rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:0.5rem;">
        * 키는 브라우저 localStorage에만 저장되며 서버로 전송되지 않습니다.
      </p>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
